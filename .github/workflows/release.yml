name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g., 1.2.3) — leave empty to use bump type"
        required: false
        default: ""
      bump:
        description: "Version bump type (if version not specified)"
        required: false
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (build & test only, skip publish)"
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: hyperb1iss/shared-workflows/.github/workflows/rust-release.yml@main
    with:
      version: ${{ inputs.version }}
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}
      system-deps: "libdbus-1-dev pkg-config lld"
      workspace: true
      all-features: false
      nextest: false
      generate-release-notes: true
      pass-run-id: true
      patch-workspace-dep-versions: true
      version-files: |-
        .claude-plugin/plugin.json
        .claude-plugin/marketplace.json|.plugins[0].version
        .cursor-plugin/plugin.json
        skills/unifly/SKILL.md
    permissions:
      contents: write
      actions: write
    secrets: inherit
